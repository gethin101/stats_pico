<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Log Viewer</title>
  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #111;
      color: #0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 20px;
      color: #00ff88;
    }

    #logBox {
      width: 95%;
      height: 70vh;
      margin: 0 auto;
      background: #000;
      border: 2px solid #00ff88;
      border-radius: 10px;
      padding: 20px;
      font-size: 28px;
      line-height: 1.4;
      overflow-y: auto;
      white-space: pre-wrap;
      transition: transform 0.12s linear;
    }

    #clearBtn {
      display: block;
      margin: 20px auto;
      padding: 12px 25px;
      font-size: 20px;
      background: #00ff88;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    #clearBtn:hover {
      background: #00cc66;
    }
  </style>
</head>
<body>

<h1>🔥 Live Log Viewer</h1>

<div id="logBox">Waiting for logs...</div>

<button id="clearBtn">Clear</button>

<!-- Firebase v8 SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCKYpDCPJwYpq-o1KcUza1KP75zKbbH7es",
    authDomain: "log-key-cf44e.firebaseapp.com",
    databaseURL: "https://log-key-cf44e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "log-key-cf44e",
    storageBucket: "log-key-cf44e.firebasestorage.app",
    messagingSenderId: "1037584574718",
    appId: "1:1037584574718:web:5a98efd1e8bd3cd5615daf"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const logBox = document.getElementById("logBox");
  logBox.textContent = "";

  const MAX_CHARS = 500;

  // Remove ALL control characters (0x00–0x1F and 0x7F)
  function cleanText(t) {
    return t.replace(/[\x00-\x1F\x7F]/g, "");
  }

  function sweepLeft() {
    logBox.style.transform = "translateX(-25px)";
    setTimeout(() => {
      logBox.style.transform = "translateX(0px)";
    }, 120);
  }

  function updateDisplay(text) {
    const cleaned = cleanText(text);
    if (!cleaned) return; // ignore empty after cleaning

    logBox.textContent += cleaned + " ";

    if (logBox.textContent.length > MAX_CHARS) {
      sweepLeft();
      logBox.textContent = logBox.textContent.slice(-MAX_CHARS);
    }

    logBox.scrollTop = logBox.scrollHeight;
  }

  // Firebase listener
  db.ref("logs").on("child_added", snap => {
    const data = snap.val();
    updateDisplay(data.entry);
  });

  // CLEAR BUTTON LOGIC
  document.getElementById("clearBtn").onclick = () => {
    const code = prompt("Enter clear code:");

    if (code === "Gethin*123") {
      logBox.textContent = "";
      alert("Screen cleared.");
    } else {
      window.location.href = "https://goaway.com";
    }
  };
</script>


</body>
</html>
