<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Log Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #0f0;
      padding: 20px;
    }
    #log {
      white-space: pre-wrap;
      font-size: 20px;
      background: #000;
      padding: 15px;
      border-radius: 5px;
      border: 1px solid #0f0;
      max-height: 80vh;
      overflow-y: auto;
      transition: opacity 0.3s ease;
    }
    .fade {
      opacity: 0.2;
    }
  </style>
</head>
<body>

<h1>🔥 Live Log Viewer</h1>
<div id="log">Waiting for logs...</div>

<!-- Firebase v8 SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCKYpDCPJwYpq-o1KcUza1KP75zKbbH7es",
    authDomain: "log-key-cf44e.firebaseapp.com",
    databaseURL: "https://log-key-cf44e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "log-key-cf44e",
    storageBucket: "log-key-cf44e.firebasestorage.app",
    messagingSenderId: "1037584574718",
    appId: "1:1037584574718:web:5a98efd1e8bd3cd5615daf"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const logDiv = document.getElementById("log");
  logDiv.textContent = "";

  const MAX_CHARS = 250; // how many characters to keep visible

  function updateDisplay(newText) {
    logDiv.textContent += newText + " ";

    // If too long, fade out then remove characters
    if (logDiv.textContent.length > MAX_CHARS) {
      logDiv.classList.add("fade");

      setTimeout(() => {
        // Remove characters from the start
        logDiv.textContent = logDiv.textContent.slice(-MAX_CHARS);
        logDiv.classList.remove("fade");
      }, 200);
    }

    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // Listen for new log entries
  db.ref("logs").on("child_added", snapshot => {
    const data = snapshot.val();
    updateDisplay(data.entry);
  });
</script>

</body>
</html>
