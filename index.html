<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Log Viewer</title>
  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #0a0a0a;
      color: #00ff88;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #container {
      width: 90%;
      max-width: 1400px;
      height: 80vh;
      background: #000;
      border: 3px solid #00ff88;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 0 25px #00ff88;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 40px;
      text-align: center;
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
    }

    #log {
      flex: 1;
      font-size: 32px;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-y: auto;
      padding: 20px;
      border-radius: 10px;
      background: #050505;
      border: 2px solid #00ff88;
      transition: transform 0.12s linear;
    }
  </style>
</head>
<body>

<div id="container">
  <h1>🔥 Live Log Viewer</h1>
  <div id="log">Waiting for logs...</div>
</div>

<!-- Firebase v8 SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCKYpDCPJwYpq-o1KcUza1KP75zKbbH7es",
    authDomain: "log-key-cf44e.firebaseapp.com",
    databaseURL: "https://log-key-cf44e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "log-key-cf44e",
    storageBucket: "log-key-cf44e.firebasestorage.app",
    messagingSenderId: "1037584574718",
    appId: "1:1037584574718:web:5a98efd1e8bd3cd5615daf"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const logDiv = document.getElementById("log");
  logDiv.textContent = "";

  const MAX_CHARS = 500; // MUCH bigger window now

  function sweepLeft() {
    logDiv.style.transform = "translateX(-25px)";
    setTimeout(() => {
      logDiv.style.transform = "translateX(0px)";
    }, 120);
  }

  function updateDisplay(newText) {
    logDiv.textContent += newText + " ";

    if (logDiv.textContent.length > MAX_CHARS) {
      sweepLeft();
      logDiv.textContent = logDiv.textContent.slice(-MAX_CHARS);
    }

    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // Listen for new log entries
  db.ref("logs").on("child_added", snapshot => {
    const data = snapshot.val();
    updateDisplay(data.entry);
  });
</script>

</body>
</html>
